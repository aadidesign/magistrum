services:
  - type: web
    name: magistrum-chatbot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python -m rag.ingest
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/chroma
      sizeGB: 1
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: pitch_magistrum
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_TO_EMAIL
        sync: false
      - key: KB_PATH
        value: ./kb
      - key: CHROMA_PATH
        value: /opt/render/project/src/chroma
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: SAMPLE_MODE
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
